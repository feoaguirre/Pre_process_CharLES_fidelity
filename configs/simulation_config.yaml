# =============================================================================
# CharLES Simulation Configuration File
# Description: Master configuration defining flow physics, boundary layers, 
#              and dynamic probe topologies for hypersonic cavity flows.
# =============================================================================

identity:
  run_name: "TEST_3D_LES"
  solver_type: "LES"                    # Options: "DNS", "LES"
  sgs_model: "VREMAN"                   # Options: "VREMAN", "SIGMA", "SMAGORINSKY" (Forced to "NONE" if solver is DNS)
  flow_regime: "hypersonic"             # Options: "subsonic", "supersonic", "hypersonic"
  dimensionalization_base: "delta_star" 

simulation_control:
  pbs_queue: "mafat_new_q"              # Target HPC queue
  transient_simtime_ftt: 200.0          # Flow-Through Times for the transient initialization
  steady_simtime_ftt: 100.0             # Flow-Through Times for the steady statistical gathering
  cfl: 0.8

geometry:
  structure_type: "symmetric_cavity"    
  structure_length: 20.0
  structure_depth: 80.0
  span_z: 1.0                           # Spanwise dimension (0.0 enforces 2D)
  domain_z: 1.0                         # Total domain size in Z (0.0 enforces 2D)

domain_sizing:
  l1_fixed_length: 20.0                 # Pre-gap slip boundary length
  l3_definition: "multiple_of_L"        
  l3_value: 15.0                        
  h_definition: "multiple_of_delta99"   
  h_value: 10.0                         

mesh_control:
  target_y_plus: 25.0                    
  hcp_delta: 1.0                        
  max_refinement_level: 4               
  nlayers: 8
  nsmooth: 20

flow_physics:
  target_reynolds: 3000.0               
  mach_number: 6.0
  inflow_u: 1.0
  inflow_rho: 1.0
  inflow_T: 1.0
  gamma: 1.4
  prandtl: 0.72
  mu_power_law: 0.95

boundary_layer_setup:
  method: "similarity_solution"
  fixed_l2_length: 15.0                 

boundary_conditions:
  wall_bc: "ISOTHERMAL"                  # Options: "ADIABATIC", "ISOTHERMAL"
  wall_T: 1.0                           # Ignored if ADIABATIC
  z_boundaries: "PERIODIC"              # Ignored if domain_z == 0.0

# =============================================================================
# I/O and Advanced Probing Architecture
# =============================================================================
io_and_probes:
  check_interval_steps: 1000
  
  # ---------------------------------------------------------------------------
  # Real-Time Image Diagnostics (Native CharLES 2D Slices)
  # Extracts mid-plane (Z=0.5) PNGs of specified variables at custom intervals.
  # ---------------------------------------------------------------------------
  image_outputs:
    v_velocity:
      variable: "comp(u,1)"
      write_interval: 10000
    dilatation:
      variable: "div(u)"      # Highly recommended for visualizing hypersonic shockwaves
      write_interval: 10000
    density:
      variable: "rho"
      write_interval: 10000
    temperature:
      variable: "T"
      write_interval: 20000   # Example: saving temperature less frequently
  
  # ---------------------------------------------------------------------------
  # 1. Standard Spatial Probes (Low-Frequency, Mean/Instantaneous Flow)
  # ---------------------------------------------------------------------------
  space_probes:
    gap_shear_layer: 
      write_interval: 4000
      variables: ["comp(u,0)", "comp(u,1)", "p", "rho", "comp(avg(u),0)", "avg(p)"]
      x_bounds: [0.0, 20.0]
      y_bounds: [-8.0, 8.0]
      z_bounds: [0.0, 0.0]
      x_spacing: {type: "mesh_multiple", value: 2.0}
      y_spacing: {type: "mesh_multiple", value: 2.0}
      z_spacing: {type: "uniform", points: 1}

  # ---------------------------------------------------------------------------
  # 2. High-Frequency Temporal Probes (Spectral Analysis / FFT)
  # ---------------------------------------------------------------------------
  time_probes:
    shear_layer_signal: 
      write_interval: 1000
      variables: ["comp(u,0)", "comp(u,1)", "p", "rho"]
      x_bounds: [0.0, 20.0]
      y_bounds: [-2.0, 8.0]
      z_planes: [0.0]             
      x_spacing: {type: "uniform", points: 5}
      y_spacing: {type: "uniform", points: 7}

  # ---------------------------------------------------------------------------
  # 3. Mean Flow Analysis: Skin Friction (Cf) Probes
  # Extracts nodes exactly at the wall (Y~0) to compute du/dy gradients.
  # ---------------------------------------------------------------------------
  cf_probes:
    pregap_wall_friction:
      write_interval: 50000
      variables: ["comp(u,0)", "p", "rho", "T"]
      x_bounds: [-20.0, 0.0]
      y_bounds: [0.0, 0.1]
      z_planes: [0.0]
      x_spacing: {type: "mesh_multiple", value: 1.0} 
      y_spacing: {type: "linear", points: 4} # Minimum required to resolve boundary gradient

  # ---------------------------------------------------------------------------
  # 4. Mean Flow Analysis: Boundary Layer (BL) Profiles
  # Extracts explicit vertical lines from Y=0 to Y_max for integral thicknesses.
  # ---------------------------------------------------------------------------
  boundary_layer_probes:
    pregap_bl_development:
      write_interval: 50000
      variables: ["comp(u,0)", "p", "rho", "T"]
      x_bounds: [-21.0, 0.0]
      y_bounds: [0.0, 15.0]       
      z_planes: [0.0]
      x_spacing: {type: "uniform", points: 7}   
      y_spacing: {type: "mesh_multiple", value: 1.0}

  # ---------------------------------------------------------------------------
  # 5. Large Data Post-Process (SPOD / POD / Resolvent)
  # Extracts dense volumetric arrays. Features independent transient/steady rates.
  # ---------------------------------------------------------------------------
  large_data_probes:
    spod_shear_layer_block:
      transient_write_interval: 100000  # Saved rarely during initial stabilization
      steady_write_interval: 500        # Saved frequently for modal decomposition matrices
      variables: ["comp(u,0)", "comp(u,1)", "p", "rho"]
      x_bounds: [-1.0, 30.0]       
      y_bounds: [-5.0, 5.0]       
      z_bounds: [0.0, 0.0]        
      x_spacing: {type: "mesh_multiple", value: 2.0} 
      y_spacing: {type: "mesh_multiple", value: 2.0}  
      z_spacing: {type: "mesh_multiple", value: 2.0}